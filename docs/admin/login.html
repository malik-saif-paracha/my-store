<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login – My Store</title>
  <link rel="stylesheet" href="../css/admin.css" />
</head>
<body class="login-page">

  <div class="login-card">
    <div class="login-logo">
      <h1>🛍️ My Store</h1>
      <p>Admin Panel – Sign In</p>
    </div>

    <div class="login-error" id="login-error">Invalid username or password.</div>

    <form id="login-form">
      <div class="form-group">
        <label for="username">Username</label>
        <input
          type="text"
          id="username"
          name="username"
          placeholder="admin"
          autocomplete="username"
          required
        />
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input
          type="password"
          id="password"
          name="password"
          placeholder="••••••••"
          autocomplete="current-password"
          required
        />
      </div>
      <button type="submit" class="login-btn" id="login-btn">Sign In</button>
    </form>

    <p style="text-align:center;margin-top:20px;font-size:0.85rem;color:#636e72;">
      Default credentials: <strong>admin</strong> / <strong>admin123</strong>
    </p>
  </div>

  <script>
    const ADMIN_API = 'http://localhost:5000/api';

    // Redirect if already logged in
    if (localStorage.getItem('adminToken')) {
      window.location.href = 'dashboard.html';
    }

    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('login-btn');
      const errorEl = document.getElementById('login-error');
      errorEl.style.display = 'none';
      btn.disabled = true;
      btn.textContent = 'Signing in…';

      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;

      try {
        const res = await fetch(`${ADMIN_API}/admin/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password }),
        });
        const data = await res.json();

        if (!res.ok) throw new Error(data.message || 'Login failed');

        localStorage.setItem('adminToken', data.token);
        window.location.href = 'dashboard.html';
      } catch (err) {
        errorEl.textContent = err.message;
        errorEl.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Sign In';
      }
    });
  </script>
</body>
</html>
