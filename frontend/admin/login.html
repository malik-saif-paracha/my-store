<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login – My Store</title>
  <link rel="stylesheet" href="../css/admin.css" />
</head>
<body class="login-page">

  <div class="login-card">
    <div class="login-logo">
      <h1>🛍️ My Store</h1>
      <p>Admin Panel – Sign In</p>
    </div>

    <div class="login-error" id="login-error">Invalid username or password.</div>

    <form id="login-form">
      <div class="form-group">
        <label for="username">Username</label>
        <input
          type="text"
          id="username"
          name="username"
          placeholder="admin"
          autocomplete="username"
          required
        />
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <div class="pw-wrap">
          <input
            type="password"
            id="password"
            name="password"
            placeholder="••••••••"
            autocomplete="current-password"
            required
          />
          <button type="button" id="toggle-pw" class="pw-eye" aria-label="Show password">&#128065;</button>
        </div>
      </div>
      <button type="submit" class="login-btn" id="login-btn">Sign In</button>
    </form>
  </div>

  <style>
    .pw-wrap { position: relative; }
    .pw-wrap input { padding-right: 44px; width: 100%; box-sizing: border-box; }
    .pw-eye {
      position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
      background: none; border: none; cursor: pointer; font-size: 1.1rem;
      color: #636e72; padding: 0; line-height: 1;
    }
    .pw-eye:focus { outline: none; }
  </style>

  <script>
    const ADMIN_CREDS = { username: 'malik.saif@cities406', password: 'saif.cities406' };

    if (localStorage.getItem('adminToken')) {
      window.location.href = 'dashboard.html';
    }

    document.getElementById('toggle-pw').addEventListener('click', function () {
      var pw = document.getElementById('password');
      if (pw.type === 'password') {
        pw.type = 'text';
        this.innerHTML = '&#128064;';
      } else {
        pw.type = 'password';
        this.innerHTML = '&#128065;';
      }
    });

    document.getElementById('login-form').addEventListener('submit', function (e) {
      e.preventDefault();
      var btn = document.getElementById('login-btn');
      var errorEl = document.getElementById('login-error');
      errorEl.style.display = 'none';
      btn.disabled = true;
      btn.textContent = 'Signing in…';

      var username = document.getElementById('username').value.trim();
      var password = document.getElementById('password').value;

      if (username === ADMIN_CREDS.username && password === ADMIN_CREDS.password) {
        localStorage.setItem('adminToken', 'admin-session');
        window.location.href = 'dashboard.html';
      } else {
        errorEl.textContent = 'Invalid username or password.';
        errorEl.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Sign In';
      }
    });
  </script>
</body>
</html>
