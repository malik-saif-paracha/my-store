<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shopping Cart – My Store</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- Header -->
  <header>
    <nav class="navbar">
      <a href="index.html" class="navbar-brand">🛍️ <span>My Store</span></a>
      <button class="hamburger" aria-label="Toggle navigation">
        <span></span><span></span><span></span>
      </button>
      <ul class="navbar-nav">
        <li><a href="index.html">Home</a></li>
        <li><a href="products.html">Products</a></li>
        <li>
          <a href="cart.html" class="cart-icon active" aria-label="Cart">
            🛒
            <span class="cart-badge" style="display:none">0</span>
          </a>
        </li>
      </ul>
    </nav>
  </header>

  <!-- Page Header -->
  <div class="page-header">
    <h1>🛒 Shopping Cart</h1>
    <p>Review your items before placing an order</p>
  </div>

  <section>
    <div class="container">
      <div class="cart-container">

        <!-- Left: Cart Items -->
        <div>
          <div id="cart-content">
            <!-- Populated by cart.js -->
          </div>
        </div>

        <!-- Right: Summary + Checkout Form -->
        <div id="checkout-section">
          <!-- Summary -->
          <div class="cart-summary">
            <h3>Order Summary</h3>
            <div class="summary-row">
              <span>Subtotal</span>
              <span id="subtotal">$0.00</span>
            </div>
            <div class="summary-row">
              <span>Shipping</span>
              <span id="shipping">$0.00</span>
            </div>
            <div class="summary-row total">
              <span>Total</span>
              <span id="total">$0.00</span>
            </div>
          </div>

          <!-- Checkout Form -->
          <div class="checkout-form">
            <h3>Shipping Details</h3>
            <form id="order-form">
              <div class="form-group">
                <label for="customerName">Full Name *</label>
                <input type="text" id="customerName" name="customerName" required placeholder="Your full name" />
              </div>
              <div class="form-group">
                <label for="customerEmail">Email Address *</label>
                <input type="email" id="customerEmail" name="customerEmail" required placeholder="your@email.com" />
              </div>
              <div class="form-group">
                <label for="customerPhone">Phone Number *</label>
                <input type="tel" id="customerPhone" name="customerPhone" required placeholder="+1 234 567 8900" />
              </div>
              <div class="form-group">
                <label for="shippingAddress">Shipping Address *</label>
                <textarea id="shippingAddress" name="shippingAddress" required placeholder="Street, City, State, ZIP"></textarea>
              </div>

              <div style="background:#f9f0ff;padding:12px 15px;border-radius:8px;margin-bottom:18px;font-size:0.9rem;color:#636e72;">
                💳 <strong>Payment:</strong> Cash on Delivery (No online payment required)
              </div>

              <div style="display:flex;justify-content:space-between;align-items:center;">
                <span style="font-weight:700;font-size:1.1rem;">Total: <span id="order-total" style="color:#e91e8c;">$0.00</span></span>
                <button type="submit" class="btn btn-dark" id="submit-btn">Place Order</button>
              </div>
            </form>
          </div>
        </div>

      </div>
    </div>
  </section>

  <!-- Footer -->
  <footer>
    <p>© 2024 My Store. Made with ❤️ | <a href="admin/login.html">Admin Panel</a></p>
  </footer>

  <script src="js/utils.js"></script>
  <script src="js/cart.js"></script>
</body>
</html>
