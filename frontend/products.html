<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Products – My Store</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- Header -->
  <header>
    <nav class="navbar">
      <a href="index.html" class="navbar-brand">🛍️ <span>My Store</span></a>
      <button class="hamburger" aria-label="Toggle navigation">
        <span></span><span></span><span></span>
      </button>
      <ul class="navbar-nav">
        <li><a href="index.html">Home</a></li>
        <li><a href="products.html" class="active">Products</a></li>
        <li>
          <a href="cart.html" class="cart-icon" aria-label="Cart">
            🛒
            <span class="cart-badge" style="display:none">0</span>
          </a>
        </li>
      </ul>
    </nav>
  </header>

  <!-- Page Header -->
  <div class="page-header">
    <h1>All Products</h1>
    <p>Find the perfect item for you</p>
  </div>

  <!-- Products Section -->
  <section>
    <div class="container">

      <!-- Filter Bar -->
      <div class="filter-bar">
        <label for="search-input">🔍 Search:</label>
        <input
          type="text"
          id="search-input"
          placeholder="Search products…"
          style="flex:1;min-width:200px;"
        />

        <label for="category-filter">Category:</label>
        <select id="category-filter">
          <option value="">All Categories</option>
          <option value="Cosmetics">💄 Cosmetics</option>
          <option value="Baby Dresses">👶 Baby Dresses</option>
        </select>

        <span id="product-count" style="margin-left:auto;color:#636e72;font-size:0.9rem;white-space:nowrap;"></span>
      </div>

      <!-- Products Grid -->
      <div class="products-grid" id="products-grid">
        <div class="loading-wrapper" style="grid-column:1/-1">
          <div class="spinner"></div>
        </div>
      </div>

    </div>
  </section>

  <!-- Footer -->
  <footer>
    <p>© 2024 My Store. Made with ❤️ | <a href="admin/login.html">Admin Panel</a></p>
  </footer>

  <script src="js/utils.js"></script>
  <script src="js/products.js"></script>
</body>
</html>
